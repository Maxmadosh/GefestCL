:root {
  color-scheme: light;
  --bg: #eef6fb;
  --surface: #ffffff;
  --surface-2: #f7fbfe;
  --text: #142233;
  --muted: #78889a;
  --line: #dceaf3;
  --blue: #2aabee;
  --blue-dark: #168dcc;
  --blue-soft: #e5f6fd;
  --green: #30b979;
  --yellow: #f5b947;
  --red: #ef5b66;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
  color: var(--text);
}

button, input, textarea {

}

button {

}

.mobile-frame {
  width: min(100vw, 430px);
  min-height: 100vh;
  margin: 0 auto;
  background: #f6f9fc;
  display: grid;
  grid-template-rows: auto 1fr auto;
  box-shadow: 0 0 0 1px rgba(20, 34, 51, 0.05), 0 24px 70px rgba(36, 81, 115, 0.15);
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  padding: 18px 16px 14px;
  background: rgba(255, 255, 255, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}

.app-title {
  font-size: 23px;
  line-height: 1.1;
  font-weight: 780;
  letter-spacing: 0;
}

.app-subtitle {

  color: var(--muted);
  font-size: 12px;
  font-weight: 650;
}

.avatar {

  height: 38px;
  border: 0;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;

}

.screen-body {

  padding: 16px 14px 20px;
}

h2 {

  color: var(--blue-dark);
  font-size: 12px;
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

small {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}

.primary, .secondary {

  border: 0;
  border-radius: 15px;
  padding: 0 16px;
  font-weight: 760;
}

.primary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 10px 24px rgba(42, 171, 238, 0.22);
}

.secondary {
  background: var(--blue-soft);
  color: var(--blue-dark);
}

.wide { width: 100%; }

.draft-card, .upload-card, .material, .source-field, .photo-card, .notice, .warning, .report-preview, .summary-grid, .profile-card, .accordion {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
}

.draft-card, .profile-card {
  display: grid;
  grid-template-columns: 46px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.profile-card {
  background: linear-gradient(135deg, #ffffff 0%, #eef9ff 100%);
}

.muted-card { background: rgba(255, 255, 255, 0.7); }

.site-mark {
  width: 46px;
  height: 46px;
  border-radius: 15px;
  display: grid;
  place-items: center;
  background: var(--blue-soft);
  color: var(--blue-dark);
  font-weight: 800;
}

.site-mark.small { font-size: 18px; }

.progress {
  height: 7px;
  margin-top: 10px;
  background: #e2edf5;
  border-radius: 999px;
  overflow: hidden;
}

.progress i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--green);
}

.quick-grid, .field-grid, .photo-grid, .summary-grid {
  display: grid;
  gap: 10px;
}

.quick-grid {
  grid-template-columns: repeat(2, 1fr);
}

.quick-grid button {
  min-height: 74px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--surface);
  color: var(--text);
  font-weight: 730;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 62px;
  min-height: 25px;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 760;
  white-space: nowrap;
}

.badge-blue { background: var(--blue-soft); color: var(--blue-dark); }
.badge-green { background: #e8f8f1; color: #199764; }
.badge-yellow { background: #fff5dc; color: #a56c00; }
.badge-red { background: #fff0f2; color: #bf3342; }

.source-field {
  min-height: 76px;
  padding: 12px;
}

.source-field > div {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

.source-field span:first-child {
  color: var(--muted);
  font-size: 12px;
  font-weight: 720;
}

.source-field strong {
  display: block;
  font-size: 16px;
  line-height: 1.25;
}

.source-field .inline-edit {
  width: 100%;
  min-height: 38px;
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 0 8px;
  background: var(--surface-2);
  color: var(--text);
  font-size: 16px;
  font-weight: 720;
  outline: none;
}

.source-field .inline-edit:focus,
.editable-table input:focus,
.material input:focus,
.notes:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(42, 171, 238, 0.12);
}

.source-field.review {
  background: #fffdf7;
  border-color: #f5dc97;
}

.input-field {
  display: block;
  margin-bottom: 10px;
}

.input-field span {
  display: block;
  margin: 0 2px 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 720;
}

.input-field input {
  width: 100%;
  min-height: 46px;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 0 12px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}

.input-field input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(42, 171, 238, 0.12);
}

.triple {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.upload-card {
  display: grid;
  grid-template-columns: 46px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}

.file-icon {
  width: 46px;
  height: 46px;
  border-radius: 15px;
  display: grid;
  place-items: center;
  background: var(--blue-soft);
  color: var(--blue-dark);
  font-weight: 800;
}

.file-button {
  position: absolute;
  right: 12px;
  bottom: 10px;
  color: var(--blue-dark);
  font-size: 11px;
  font-weight: 720;
  overflow: hidden;
}

.file-button input, .photo-action input {
  position: absolute;
  inset: 0;
  opacity: 0;
}

.notice {
  padding: 14px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.table {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface);
}

.table-row {
  min-width: 610px;
  display: grid;
  grid-template-columns: repeat(var(--cols, 6), minmax(80px, 1fr));
  border-bottom: 1px solid var(--line);
}

.table-row:last-child { border-bottom: 0; }

.table-row span {
  padding: 10px 8px;
  border-right: 1px solid var(--line);
  font-size: 12px;
  line-height: 1.25;
}

.table-row span:last-child { border-right: 0; }

.table-row.head {
  background: #e8f7fd;
  color: var(--blue-dark);
  font-weight: 800;
}

.materials {
  display: grid;
  gap: 8px;
}

.material {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 11px;
}

.material > span {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.material.mismatch {
  border-color: #f5dc97;
  background: #fffdf7;
}

.material input,
.editable-table input {

  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 7px 8px;
  background: var(--surface-2);
  color: var(--text);
  outline: none;

.material-name {
  margin-bottom: 7px;
  font-weight: 760;
}

.material-edit-row {
  display: grid;
  grid-template-columns: 1fr 58px 54px;
  gap: 6px;
}

.material-note {
  margin-top: 6px;
  font-size: 12px;

.photo-grid {

.photo-card {

.photo-card.done {

.photo-action {

  height: 38px;
  border-radius: 13px;
  display: grid;
  place-items: center;
  background: var(--surface);
  color: var(--blue-dark);
  font-size: 20px;
  font-weight: 800;

.summary-grid {

.report-preview {

.tab {

    overflow: hidden;
  }

  ],

    departurePoint: "Ош",

    returnDestination: "Ош",
    kmToObject: "",
    kmBack: "",

    comment: ""

};

let state = {
  screen: "create",
  problemOnly: false,
  openSections: new Set(["general"]),
  checklist: loadChecklist()
};

function loadChecklist() {
  if (typeof localStorage === "undefined") return structuredClone(defaultChecklist);
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return structuredClone(defaultChecklist);
  try {
    return { ...structuredClone(defaultChecklist), ...JSON.parse(raw) };
  } catch {
    return structuredClone(defaultChecklist);
  }
}

function saveChecklist() {
  if (typeof localStorage === "undefined") return;
  state.checklist.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.checklist));
}

function summary(checklist) {
  const missingPhotos = checklist.photos.filter((photo) => photo.required && !photo.attached).length;
  const mismatches = checklist.materials.filter((item) => item.status === "mismatch").length;
  const reviews = checklist.fields.filter((field) => field.status === "review").length +
    checklist.materials.filter((item) => item.status !== "confirmed").length;
  const mileageMissing = !checklist.mileage.kmToObject || !checklist.mileage.kmBack || !checklist.mileage.totalKm;
  const warnings = [
    "В двух накладных разные позиции: FS5A/FS3A, LPU2/LPU, BS9900A/BS8900A, VC9910A/BC8910A.",
    "Рукописные ФИО и часть телефонов в скане требуют ручной проверки.",
    "Количество Cold Shrink: накладная 72, в скане визуально похоже на 73."
  ];
  if (mileageMissing) warnings.push("Пробег до объекта и обратно должен быть заполнен монтажником перед отправкой.");
  if (missingPhotos) warnings.push(`Не хватает обязательных фото: ${missingPhotos}.`);
  return {
    autofillPercent: 78,
    reviewFieldCount: reviews,
    missingRequiredPhotos: missingPhotos,
    materialMismatches: mismatches,
    canSubmit: !missingPhotos && !mileageMissing,
    warnings
  };
}

function badge(text, tone = "blue") {

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function categoryMaterials(category) {
  const items = state.checklist.materials.filter((item) => materialCategory(item) === category);
  if (!items.length) return `<div class="notice compact-note">Позиции из накладной для этого блока пока не найдены.</div>`;
  return `
    <h2>Позиции из накладной</h2>

      <article class="material ${m.status}">
        <span>${m.no}</span>
        <div><strong>${escapeHtml(m.name)}</strong><p>${escapeHtml(m.code)} · ${escapeHtml(m.qty)} ${escapeHtml(m.unit)}${m.note ? ` · ${escapeHtml(m.note)}` : ""}</p></div>
        ${badge(categoryLabel(materialCategory(m)), m.status === "confirmed" ? "green" : "yellow")}
      </article>
    `).join("")}</div>
  `;
}

function materialCategorySummary() {
  const counters = new Map();
  for (const item of state.checklist.materials) {
    const category = materialCategory(item);
    counters.set(category, (counters.get(category) || 0) + 1);
  }
  const chips = materialCategories
    .filter(({ key }) => counters.has(key))
    .map(({ key }) => badge(`${categoryLabel(key)}: ${counters.get(key)}`, "blue"))
    .join("");
  return chips ? `<div class="notice compact-note">${chips}</div>` : "";
}

function materialCategory(item) {
  return item.category || classifyMaterial(item);
}

const materialCategories = [
  { key: "power", label: "питание" },
  { key: "rru", label: "RRU" },
  { key: "bbu", label: "BBU" },
  { key: "antenna", label: "антенна" },
  { key: "feeder", label: "кабель" },
  { key: "mounting", label: "монтаж" },
  { key: "cabinet", label: "шкаф" },
  { key: "material", label: "прочее" }
];

function categoryLabel(category) {
  return materialCategories.find((item) => item.key === category)?.label || "прочее";
}

function classifyMaterial(item) {
  const text = `${item.code || ""} ${item.name || ""}`.toLowerCase();
  if (/battery|акб|rectifier|zxd|dcpd|b201|csu|power system|monitoring unit/.test(text)) return "power";
  if (/rru|rsu|r9224|r8854|rru8854|rru9224|s2600|m1821/.test(text)) return "rru";
  if (/bbu|fs3|fs5|bpq|bpn|bpk|ccf|ubpg|vfc|vem|vpd|pm5|fan/.test(text)) return "bbu";
  if (/antenna|антенн|commscope|mb4p|gps antenna|ret motor/.test(text)) return "antenna";
  if (/jumper|connector|cold shrink|shrink|lpu|aisg|fiber|feeder|ground kit|triplex|diplexer|quad.*diplexer/.test(text)) return "feeder";
  if (/installation|fitting|frame|rack|roof|foundation|holder|bracket|clamp|label|tape|buckle|tie|seal|sleeve/.test(text)) return "mounting";
  if (/cable|кабель|pvc|opt|dc cable|pm power/.test(text)) return "feeder";
  if (/bc|pc|vc|tec|bs8900|bs9900|cabinet/.test(text)) return "cabinet";
  return "material";
}

function accordionSection(id, title, meta, body, required = false) {
  const open = state.openSections.has(id);
  return `<article class="accordion ${open ? "open" : ""}">
    <button class="accordion-head" data-section="${id}">
      <span class="plus">${open ? "−" : "+"}</span>
      <strong>${title}${required ? ' <em>*</em>' : ""}</strong>
      ${meta}
    </button>
    <div class="accordion-body">${body}</div>
  </article>`;
}

function table(headers, rows) {
  return `<div class="table" style="--cols:${headers.length}">
    <div class="table-row head">${headers.map((h) => `<span>${h}</span>`).join("")}</div>
    ${rows.map((row) => `<div class="table-row">${row.map((cell) => `<span>${escapeHtml(cell)}</span>`).join("")}</div>`).join("")}
  </div>`;
}

function editableTable(collection, headers, keys, rows) {
  return `<div class="table editable-table" style="--cols:${headers.length}">
    <div class="table-row head">${headers.map((h) => `<span>${h}</span>`).join("")}</div>
    ${rows.map((row, index) => `<div class="table-row">${keys.map((key) => `
      <span><input type="text" value="${escapeHtml(key === "status" ? row[key] || "соответствует" : row[key])}" data-list="${collection}" data-index="${index}" data-key="${key}" /></span>
    `).join("")}</div>`).join("")}
  </div>`;
}

function channelLabel(channel) {
  return { email: "Email", whatsapp: "WhatsApp", telegram: "Telegram" }[channel];
}

function reportPreview(s) {
  return `<article class="report-preview">
    <h2>Предпросмотр отчета</h2>
    <div class="report-head"><strong>Gefest Cl</strong><span>PDF + Excel</span></div>
    <div class="report-row"><span>Сайт</span><b>${state.checklist.object.siteId} · ${state.checklist.object.siteName}</b></div>
    <div class="report-row"><span>БС</span><b>ZTE 8900 / 8900A · BC8900A · PC8910A</b></div>
    <div class="report-row"><span>Готовность</span><b>${s.autofillPercent}% · ${s.reviewFieldCount} проверить · ${s.missingRequiredPhotos} фото</b></div>
    <div class="report-actions"><button disabled>Сформировать PDF</button><button disabled>Сформировать Excel</button></div>
  </article>`;
}

function render() {
  if (typeof document === "undefined") return;
  const app = document.querySelector("#app");
  const screens = {
    create: renderCreate,
    checklist: renderChecklist,
    history: renderHistory
  };
  app.innerHTML = `<main class="mobile-frame">${screens[state.screen]()}</main>`;
}

if (typeof document !== "undefined") document.addEventListener("click", (event) => {
  const target = event.target.closest("[data-screen], [data-action], [data-channel], [data-section]");
  if (!target) return;
  if (target.dataset.screen) setScreen(target.dataset.screen);
  if (target.dataset.action === "home") setScreen("create");
  if (target.dataset.section) {
    if (state.openSections.has(target.dataset.section)) state.openSections.delete(target.dataset.section);
    else state.openSections.add(target.dataset.section);
    render();
  }
  if (target.dataset.action === "new-checklist") setScreen("checklist");
  if (target.dataset.channel) {
    state.checklist.sendChannel = target.dataset.channel;
    saveChecklist();
    render();
  }
  if (target.dataset.action === "submit") {
    const s = summary(state.checklist);
    state.checklist.status = s.canSubmit ? "pending" : "draft";
    saveChecklist();
    render();
  }
});

if (typeof document !== "undefined") document.addEventListener("input", (event) => {
  const input = event.target;
  if (input.dataset?.profile) {
    state.checklist.profile[input.dataset.profile] = input.value;
    if (input.dataset.profile === "brigadierFullName") state.checklist.object.brigadierName = input.value;
    if (input.dataset.profile === "phone") state.checklist.object.brigadierPhone = input.value;
    if (input.dataset.profile === "contractorCompany") state.checklist.object.contractorCompany = input.value;
    saveChecklist();
  }
  if (input.dataset?.object) {
    state.checklist.object[input.dataset.object] = input.value;
    if (input.dataset.object === "siteId" || input.dataset.object === "siteName") {
      state.checklist.fields[0].value = `${state.checklist.object.siteId} · ${state.checklist.object.siteName}`;
    }
    saveChecklist();
  }
  if (input.dataset?.mileage) {
    state.checklist.mileage[input.dataset.mileage] = input.value;
    if (input.dataset.mileage === "kmToObject" || input.dataset.mileage === "kmBack") {
      const to = Number(state.checklist.mileage.kmToObject || 0);
      const back = Number(state.checklist.mileage.kmBack || 0);
      state.checklist.mileage.totalKm = to || back ? String(to + back) : "";
    }
    saveChecklist();
  }
  if (input.dataset?.field) {
    const field = state.checklist.fields[Number(input.dataset.field)];
    if (field) {
      field.value = input.value;
      field.status = input.value.trim() ? "ok" : "review";
      syncObjectFromField(field);
      saveChecklist();
    }
  }
  if (input.dataset?.list) {
    const row = state.checklist[input.dataset.list]?.[Number(input.dataset.index)];
    if (row) {
      row[input.dataset.key] = input.value;
      saveChecklist();
    }
  }
  if (input.dataset?.material) {
    const material = state.checklist.materials.find((item) => item.no === input.dataset.material);
    if (material) {
      material[input.dataset.materialKey] = input.value;
      if (input.dataset.materialKey === "name" || input.dataset.materialKey === "code") {
        material.category = classifyMaterial(material);
      }
      saveChecklist();
    }
  }
  if ("notes" in input.dataset) {
    state.checklist.notes = input.value;
    saveChecklist();
  }
});

function syncObjectFromField(field) {
  if (field.key === "site") {
    const [siteId, siteName] = field.value.split("·").map((part) => part.trim());
    if (siteId) state.checklist.object.siteId = siteId;
    if (siteName) state.checklist.object.siteName = siteName;
  }
  if (field.key === "work") state.checklist.object.workType = field.value;
  if (field.key === "siteType") state.checklist.object.siteType = field.value;
  if (field.key === "date") state.checklist.object.acceptanceDate = field.value;
  if (field.key === "time") {
    const [startTime, endTime] = field.value.split("-").map((part) => part.trim());
    if (startTime) state.checklist.object.startTime = startTime;
    if (endTime) state.checklist.object.endTime = endTime;
  }
}

if (typeof document !== "undefined") document.addEventListener("change", (event) => {
  const input = event.target;
  const fileName = input.files?.[0]?.name;
  if (!fileName) return;
  if (input.dataset.doc) {
    const doc = state.checklist.documents.find((item) => item.id === input.dataset.doc);
    if (doc) {
      doc.fileName = fileName;
      doc.status = "manual";
      if (fileName.toLowerCase().endsWith(".xlsx")) {
        parseXlsxDeliveryNote(input.files[0])
          .then((result) => {
            doc.status = "recognized";
            doc.note = `${result.materials.length} позиций распознано`;
            if (result.siteName) {
              state.checklist.object.siteName = result.siteName;
              state.checklist.fields[0].value = `${state.checklist.object.siteId} · ${result.siteName}`;
            }
            state.checklist.materials = mergeParsedMaterials(result.materials, state.checklist.materials);
            saveChecklist();
            render();
          })
          .catch((error) => {
            doc.status = "error";
            doc.note = `ошибка чтения: ${error.message}`;
            saveChecklist();
            render();
          });
      } else {
        saveChecklist();
        render();
      }
    }
  }
  if (input.dataset.photo) {
    const photo = state.checklist.photos.find((item) => item.id === input.dataset.photo);
    if (photo) {
      photo.fileName = fileName;
      photo.attached = true;
      saveChecklist();
      render();
    }
  }
});

render();

export const __gefestTestApi = {
  defaultChecklist,
  summary,
  mergeParsedMaterials,
  classifyMaterial
};

function mergeParsedMaterials(parsed, previous) {
  const previousByKey = new Map(previous.map((item) => [`${item.code}|${item.name}`, item]));
  return parsed.map((item) => {
    const prior = previousByKey.get(`${item.code}|${item.name}`);
    return {
      no: item.no,
      code: item.code,
      name: item.name,
      qty: item.qty,
      unit: item.unit,
      inventoryNumber: item.inventoryNumber,
      category: prior?.category || classifyMaterial(item),
      status: prior?.status === "mismatch" ? "mismatch" : "confirmed",
      note: prior?.note || ""
    };
  });
}

async function parseXlsxDeliveryNote(file) {
  const buffer = await file.arrayBuffer();
  const zip = readZipDirectory(buffer);
  const sharedStrings = await readSharedStrings(zip);
  const sheetXml = await readZipText(zip, "xl/worksheets/sheet1.xml");
  const rows = parseWorksheet(sheetXml, sharedStrings);
  const materials = [];
  let siteName = "";

  for (const row of rows) {
    if (!siteName && row.B && String(row.B).includes("(")) siteName = String(row.B).trim();
    const rowNumber = Number(row.A);
    if (!Number.isFinite(rowNumber)) continue;
    if (rowNumber < 1 || rowNumber > 200) continue;
    if (!row.C && !row.E) continue;
    materials.push({
      no: String(row.A || ""),
      code: String(row.C || "").trim(),
      inventoryNumber: String(row.D || "").trim(),
      name: String(row.E || "").trim(),
      qty: String(row.G || row.H || "").trim(),
      unit: String(row.I || "").trim()
    });
  }

  return { siteName, materials };
}

function readZipDirectory(buffer) {
  const bytes = new Uint8Array(buffer);
  const view = new DataView(buffer);
  let eocd = -1;
  for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i -= 1) {
    if (view.getUint32(i, true) === 0x06054b50) {
      eocd = i;
      break;
    }
  }
  if (eocd < 0) throw new Error("ZIP каталог не найден");

  const entryCount = view.getUint16(eocd + 10, true);
  const centralOffset = view.getUint32(eocd + 16, true);
  const entries = new Map();
  let offset = centralOffset;

  for (let i = 0; i < entryCount; i += 1) {
    if (view.getUint32(offset, true) !== 0x02014b50) throw new Error("ZIP запись повреждена");
    const method = view.getUint16(offset + 10, true);
    const compressedSize = view.getUint32(offset + 20, true);
    const fileNameLength = view.getUint16(offset + 28, true);
    const extraLength = view.getUint16(offset + 30, true);
    const commentLength = view.getUint16(offset + 32, true);
    const localOffset = view.getUint32(offset + 42, true);
    const name = new TextDecoder().decode(bytes.slice(offset + 46, offset + 46 + fileNameLength));

    const localNameLength = view.getUint16(localOffset + 26, true);
    const localExtraLength = view.getUint16(localOffset + 28, true);
    const dataOffset = localOffset + 30 + localNameLength + localExtraLength;
    entries.set(name, {
      method,
      data: bytes.slice(dataOffset, dataOffset + compressedSize)
    });

    offset += 46 + fileNameLength + extraLength + commentLength;
  }

  return entries;
}

async function readZipText(zip, path) {
  const entry = zip.get(path);
  if (!entry) throw new Error(`${path} не найден`);
  let data;
  if (entry.method === 0) {
    data = entry.data;
  } else if (entry.method === 8) {
    data = await inflateRaw(entry.data);
  } else {
    throw new Error(`ZIP метод ${entry.method} не поддержан`);
  }
  return new TextDecoder("utf-8").decode(data);
}

async function inflateRaw(data) {
  if (typeof DecompressionStream !== "undefined") {
    const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
    return new Uint8Array(await new Response(stream).arrayBuffer());
  }
  throw new Error("браузер не поддерживает deflate-raw");
}

async function readSharedStrings(zip) {
  if (!zip.has("xl/sharedStrings.xml")) return [];
  const xml = await readZipText(zip, "xl/sharedStrings.xml");
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  return [...doc.getElementsByTagName("si")].map((si) =>
    [...si.getElementsByTagName("t")].map((t) => t.textContent || "").join("")
  );
}

function parseWorksheet(xml, sharedStrings) {
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  const rowsByNumber = new Map();
  for (const cell of doc.getElementsByTagName("c")) {
    const ref = cell.getAttribute("r") || "";
    const match = ref.match(/^([A-Z]+)(\d+)$/);
    if (!match) continue;
    const [, col, rowText] = match;
    const rowNumber = Number(rowText);
    const type = cell.getAttribute("t");
    const raw = cell.getElementsByTagName("v")[0]?.textContent || "";
    const inline = cell.getElementsByTagName("t")[0]?.textContent || "";
    let value = raw;
    if (type === "s") value = sharedStrings[Number(raw)] || "";
    if (type === "inlineStr") value = inline;
    if (!rowsByNumber.has(rowNumber)) rowsByNumber.set(rowNumber, {});
    rowsByNumber.get(rowNumber)[col] = value;
  }
  return [...rowsByNumber.entries()]
    .sort(([a], [b]) => a - b)
    .map(([, row]) => row);
}
